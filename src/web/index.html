<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wisteria Intelligence | 每日情报</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #0f0f0f;
            --tg-theme-text-color: #ffffff;
            --tg-theme-hint-color: #888888;
            --tg-theme-button-color: #2ea6ff;
            --tg-theme-button-text-color: #ffffff;
            --card-bg: #1e1e1e;
            --accent-red: #ff4b4b;
            --accent-green: #00e676;
            --accent-gold: #ffd700;
        }

        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            background: linear-gradient(90deg, #2ea6ff, #a960ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--tg-theme-hint-color);
            font-size: 12px;
            margin-top: 4px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 100px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-red { background: rgba(255, 75, 75, 0.2); color: var(--accent-red); }
        .badge-green { background: rgba(0, 230, 118, 0.2); color: var(--accent-green); }

        .oracle-insight {
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value { font-size: 18px; font-weight: bold; display: block; }
        .stat-label { font-size: 11px; color: var(--tg-theme-hint-color); }

        .btn-action {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Wisteria Intelligence</h1>
        <p>全球情报共振系统 (Oracle V2.0)</p>
    </div>

    <!-- 1. Oracle Insight Card -->
    <div class="card" style="border: 1px solid rgba(255,215,0,0.3);">
        <div class="card-title">
            <span style="color: var(--accent-gold);">🔮 先知 (Oracle) 预测</span>
            <span class="badge badge-red">LIVE</span>
        </div>
        <div id="oracle-text" class="oracle-insight">
            正在连接量子情报网...<br>
            (Connecting to Oracle Brain...)
        </div>
    </div>

    <!-- 2. Market Sentiment -->
    <div class="card">
        <div class="card-title">📊 实时共振指数</div>
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-value" style="color: var(--accent-red);">8.5/10</span>
                <span class="stat-label">战争/地缘风险</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" style="color: var(--accent-green);">High</span>
                <span class="stat-label">加密货币热度</span>
            </div>
        </div>
    </div>

    <!-- 3. Paywall / Action -->
    <button class="btn-action" onclick="Telegram.WebApp.close()">
        🔒 订阅高级情报 (Pro)
    </button>

    <script>
        // Init Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.text = "刷新数据";
        tg.MainButton.show();
        tg.MainButton.onClick(() => window.location.reload());

        // Fetch Data from Backend
        async function loadData() {
            try {
                // In production, this fetches from your Python backend
                const response = await fetch('/api/latest-report');
                const data = await response.json();
                
                if (data.insight) {
                    // Convert Markdown-like text to HTML breaks
                    const formatted = data.insight
                        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // Bold
                        .replace(/\n/g, '<br>');
                    document.getElementById('oracle-text').innerHTML = formatted;
                }
            } catch (e) {
                // Mock Data for Demo if backend not running
                console.log("Using Mock Data");
                setTimeout(() => {
                    document.getElementById('oracle-text').innerHTML = 
                        "🔥 <b>[流媒体共振]</b>: Bitcoin (Weibo+TikTok+X)<br>" +
                        "🔴 <b>[关键事件]</b>: SEC批准新ETF (震级: 9/10)<br>" +
                        "📈 <b>[市场影响]</b>: BTC短期看涨至100k<br>" +
                        "📝 <b>[昨日复盘]</b>: 准确率 High";
                }, 500);
            }
        }

        loadData();
    </script>
</body>
</html>
