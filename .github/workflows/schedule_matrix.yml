name: Multi-Bot News Matrix

on:
  schedule:
    # 极速套利模式 (High-Frequency Arbitrage)
    # 频率: 每20分钟运行一次 (*/20)
    # 消耗: 每月约 1500 分钟 (2000分钟免费额度内)
    - cron: '*/20 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  run-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx mcp

      - name: Run Bot Matrix
        env:
          # Mapping GitHub Secrets to Script Environment Variables
          # Bot A (World) -> WORLDNEWSBOTTOKEN
          BOT_TOKEN_A: ${{ secrets.WORLDNEWSBOTTOKEN }}
          CHAT_ID_A: ${{ secrets.OPENNEWS_TELEGRAM_CHAT_ID }}
          
          # Bot B (Finance) -> FINANCEBOTTOKEN
          BOT_TOKEN_B: ${{ secrets.FINANCEBOTTOKEN }}
          CHAT_ID_B: ${{ secrets.OPENNEWS_TELEGRAM_CHAT_ID }}
          
          # Bot C (Politics) -> POLITICSBOTTOKEN
          BOT_TOKEN_C: ${{ secrets.POLITICSBOTTOKEN }}
          CHAT_ID_C: ${{ secrets.OPENNEWS_TELEGRAM_CHAT_ID }}
          
          # Bot D (Entertainment) -> ENTERTAINMENTBOTTOKEN
          BOT_TOKEN_D: ${{ secrets.ENTERTAINMENTBOTTOKEN }}
          CHAT_ID_D: ${{ secrets.OPENNEWS_TELEGRAM_CHAT_ID }}
          
          # Bot E (Military) -> MILLITARYBOTTOKEN
          BOT_TOKEN_E: ${{ secrets.MILLITARYBOTTOKEN }}
          CHAT_ID_E: ${{ secrets.OPENNEWS_TELEGRAM_CHAT_ID }}

          # Bot F (Oracle) -> Reusing Bot A or dedicated if available
          BOT_TOKEN_F: ${{ secrets.WORLDNEWSBOTTOKEN }}
          CHAT_ID_F: ${{ secrets.OPENNEWS_TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: |
          # 确保 PYTHONPATH 包含项目根目录
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # Step 1: Run Matrix Bots (A-E)
          python src/run_multibot_matrix.py
          
          # Step 2: Run Oracle (Bot F)
          # Ensure Oracle runs AFTER the matrix has finished gathering signals
          python src/bot_f_oracle.py
